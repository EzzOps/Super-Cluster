name: Provision persistent Super-Cluster on VPS

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/provision-capi-management-cluster.yml'
      - 'clusters/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

env:
  SSH_OPTS: >-
    -o StrictHostKeyChecking=no
    -o PreferredAuthentications=password
    -o PubkeyAuthentication=no
    -o UserKnownHostsFile=/dev/null
    -o LogLevel=ERROR

jobs:
  ensure-super-cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools (sshpass, kubectl, Flux CLI, clusterctl)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.29.2/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          curl -s https://fluxcd.io/install.sh | sudo bash
          curl -sL https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.7.0/clusterctl-linux-amd64 -o /usr/local/bin/clusterctl
          chmod +x /usr/local/bin/clusterctl
          kubectl version --client --output=yaml
          flux --version
          clusterctl version

      - name: Test SSH connectivity to VPS
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" "echo SSH_OK && uname -a && free -h"

      - name: Ensure K3s management cluster is running
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          if command -v k3s >/dev/null 2>&1 && systemctl is-active --quiet k3s; then
            echo "K3s management cluster already running"
          else
            echo "Installing K3s management cluster..."
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode=644" sh -
            systemctl enable --now k3s
          fi
          echo "Waiting for K3s to be ready..."
          for i in $(seq 1 30); do
            if kubectl get nodes --no-headers 2>/dev/null | grep -q Ready; then
              echo "K3s ready after ${i}s"
              break
            fi
            sleep 2
          done
          kubectl get nodes -o wide
          REMOTE

      - name: Ensure Docker is installed (required by CAPD)
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com | sh
          else
            echo "Docker already installed"
          fi
          docker version
          REMOTE

      - name: Retrieve management kubeconfig
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          mkdir -p /tmp/kubeconfigs
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}"             'sudo cat /etc/rancher/k3s/k3s.yaml' > /tmp/kubeconfigs/mgmt.yaml
          sed -i "s/127.0.0.1/${{ secrets.HOST }}/g" /tmp/kubeconfigs/mgmt.yaml
          chmod 600 /tmp/kubeconfigs/mgmt.yaml
          echo "Management kubeconfig retrieved"

      - name: Bootstrap Flux on management cluster
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          BRANCH="${GITHUB_REF_NAME:-main}"
          kubectl create namespace flux-system --dry-run=client -o yaml | kubectl apply -f -
          flux bootstrap git             --url=https://github.com/${GITHUB_REPOSITORY}.git             --branch="${BRANCH}"             --path=./clusters/management             --token-auth             --password="$GITHUB_TOKEN"             --silent

      - name: Install Cluster API with Docker provider (CAPD)
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          echo "Initializing CAPI with Docker provider..."
          clusterctl init --infrastructure docker
          kubectl wait --for=condition=Available deployment/capi-controller-manager -n capi-system --timeout=5m 2>/dev/null || true
          kubectl wait --for=condition=Available deployment/capd-controller-manager -n capd-system --timeout=5m 2>/dev/null || true
          echo "=== CAPI / CAPD pods ==="
          kubectl get pods -A | grep -E "capi|capd|NAME"

      - name: Trigger Flux to sync CAPI Cluster manifests
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          kubectl annotate --overwrite gitrepository/flux-system -n flux-system             flux.fluxcd.io/reconcileAt="$(date +%s)"
          echo "Flux sync triggered, waiting for CAPI Cluster resources..."
          sleep 20
          echo "=== CAPI Clusters ==="
          kubectl get clusters -A

      - name: Remove stale CAPI clusters from previous runs
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          for child in child-1 child-2; do
            if kubectl get cluster "\$child" -n default --request-timeout=10s &>/dev/null; then
              echo "Deleting stale cluster \$child..."
              kubectl delete cluster "\$child" -n default --timeout=60s --wait=true
              # Also remove any leftover containers from CAPD
              kubectl get dockercluster -n default 2>/dev/null -o name | xargs -r kubectl delete -n default 2>/dev/null || true
              kubectl get dockermachinetemplate -n default 2>/dev/null -o name | xargs -r kubectl delete -n default 2>/dev/null || true
            fi
          done
          echo "Waiting for stale clusters to be fully removed..."
          for i in $(seq 1 30); do
            remaining=$(kubectl get clusters -A --request-timeout=10s --no-headers 2>/dev/null | wc -l)
            if [ "$remaining" = "0" ]; then
              echo "All stale clusters removed after ${i}s"
              break
            fi
            sleep 2
          done
          echo "Verified: No stale CAPI clusters remaining"

      - name: Wait for child clusters to be Provisioned by CAPI/CAPD
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          for child in child-1 child-2; do
            echo "Waiting for $child..."
            for i in $(seq 1 60); do
              phase=$(kubectl get cluster "$child" -n default -o jsonpath='{.status.phase}' --request-timeout=5s 2>/dev/null || echo "NotFound")
              if [ "$phase" = "Provisioned" ]; then
                echo "$child is Provisioned (after ${i}s * 5 = $((i*5))s)"
                break
              fi
              if [ "$phase" = "Failed" ]; then
                echo "$child FAILED!"
                kubectl describe cluster "$child" -n default | tail -30
                break
              fi
              sleep 5
            done
            kubectl get cluster "$child" -n default -o wide 2>/dev/null || echo "$child not found"
          done

      - name: Retrieve child cluster kubeconfigs (via clusterctl)
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          for child in child-1 child-2; do
            phase=$(kubectl get cluster "$child" -n default -o jsonpath='{.status.phase}' 2>/dev/null)
            if [ "$phase" = "Provisioned" ]; then
              clusterctl get kubeconfig "$child" -n default > "/tmp/kubeconfigs/$child.yaml" 2>/dev/null || true
              if [ -s "/tmp/kubeconfigs/$child.yaml" ]; then
                echo "Retrieved kubeconfig for $child"
              fi
            fi
          done
          ls -la /tmp/kubeconfigs/

      - name: Import child kubeconfigs into Flux for workload deployment
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          for child in child-1 child-2; do
            if [ -f "/tmp/kubeconfigs/$child.yaml" ] && [ -s "/tmp/kubeconfigs/$child.yaml" ]; then
              kubectl create secret generic "kubeconfig-$child" -n flux-system                 --from-file=value=/tmp/kubeconfigs/$child.yaml                 --dry-run=client -o yaml | kubectl apply -f -
              echo "Imported kubeconfig for $child into flux-system"
            fi
          done

      - name: Verify all systems
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          echo "=== Flux controllers ==="
          kubectl wait --for=condition=Available deployment/source-controller -n flux-system --timeout=30s 2>/dev/null
          kubectl wait --for=condition=Available deployment/kustomize-controller -n flux-system --timeout=30s 2>/dev/null
          echo ""
          echo "=== CAPI Clusters (child clusters provisioned by CAPI) ==="
          kubectl get clusters -A -o wide
          echo ""
          echo "=== CAPI Machines ==="
          kubectl get machines -A -o wide
          echo ""
          echo "=== Flux Kustomizations ==="
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A

      - name: Summary
        run: |
          echo "============================================"
          echo "  Super-Cluster is persistent & operational"
          echo "============================================"
          echo "  Management:  K3s on ${{ secrets.HOST }}:6443"
          echo "  Flux:        reconciling from ${{ github.repository }}"
          echo "  CAPI/CAPD:   installed — provisions child clusters"
          echo "  Child-1:     CAPI Cluster (Docker/CAPD)"
          echo "  Child-2:     CAPI Cluster (Docker/CAPD)"
          echo "============================================"
          echo "  Child clusters are Docker containers on the VPS host"
          echo "  provisioned by CAPI/CAPD on the management cluster"
          echo "  cluster. All persistent — no cleanup."
          echo "============================================