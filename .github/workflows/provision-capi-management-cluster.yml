name: Provision ephemeral management cluster on VPS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/provision-capi-management-cluster.yml'
      - 'clusters/management/**'
      - 'clusters/child/**'

permissions:
  contents: write

env:
  # SSH options for password-based auth to VPS
  SSH_OPTS: >-
    -o StrictHostKeyChecking=no
    -o PreferredAuthentications=password
    -o PubkeyAuthentication=no
    -o UserKnownHostsFile=/dev/null
    -o LogLevel=ERROR

jobs:
  provision-management-cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools (sshpass, kubectl, Flux CLI)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.29.2/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          curl -s https://fluxcd.io/install.sh | sudo bash
          kubectl version --client --output=yaml
          flux --version

      - name: Test SSH connectivity to VPS
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" "echo SSH_OK"
          echo "SSH connection verified"

      - name: Provision ephemeral K3s management cluster on VPS
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if command -v k3s >/dev/null 2>&1; then
            echo "K3s already installed -- skipping install"
          else
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode=644" sh -
          fi
          systemctl enable --now k3s 2>/dev/null || true
          echo "Waiting for K3s to be ready..."
          for i in $(seq 1 30); do
            if kubectl get nodes --no-headers 2>/dev/null | grep -q Ready; then
              echo "K3s ready after ${i}s"
              break
            fi
            sleep 2
          done
          kubectl get nodes
          REMOTE

      - name: Retrieve kubeconfig from VPS
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" 'sudo cat /etc/rancher/k3s/k3s.yaml' > /tmp/mgmt-kubeconfig.yaml
          sed -i "s/127.0.0.1/${{ secrets.HOST }}/g" /tmp/mgmt-kubeconfig.yaml
          chmod 600 /tmp/mgmt-kubeconfig.yaml
          export KUBECONFIG=/tmp/mgmt-kubeconfig.yaml
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Bootstrap Flux on the management cluster
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          export KUBECONFIG=/tmp/mgmt-kubeconfig.yaml
          BRANCH="${GITHUB_REF_NAME:-main}"
          kubectl create namespace flux-system --dry-run=client -o yaml | kubectl apply -f -
          flux bootstrap git \
            --url=https://github.com/${GITHUB_REPOSITORY}.git \
            --branch="${BRANCH}" \
            --path=./clusters/management \
            --token-auth \
            --password="$GITHUB_TOKEN" \
            --silent

      - name: Configure target kubeconfig for Flux
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          export KUBECONFIG=/tmp/mgmt-kubeconfig.yaml
          mkdir -p /tmp/flux-secrets
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" 'sudo cat /etc/rancher/k3s/k3s.yaml' > /tmp/flux-secrets/contabo-kubeconfig
          sed -i "s/127.0.0.1/${{ secrets.HOST }}/g" /tmp/flux-secrets/contabo-kubeconfig
          kubectl create secret generic contabo-kubeconfig -n flux-system \
            --from-file=value=/tmp/flux-secrets/contabo-kubeconfig \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify Flux reconciliation
        run: |
          export KUBECONFIG=/tmp/mgmt-kubeconfig.yaml
          kubectl wait --for=condition=Available deployment/source-controller -n flux-system --timeout=10m
          kubectl wait --for=condition=Available deployment/kustomize-controller -n flux-system --timeout=10m
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A
          echo "=== Flux is ready ==="

      - name: Cleanup (uninstall K3s from VPS)
        if: always()
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" \
            'if command -v k3s-uninstall.sh >/dev/null 2>&1; then sudo k3s-uninstall.sh; elif command -v k3s >/dev/null 2>&1; then /usr/local/bin/k3s-uninstall.sh || true; fi' || echo "Cleanup skipped (VPS may not be reachable or K3s not installed)"
