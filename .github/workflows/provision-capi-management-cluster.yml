name: Manage Management Cluster (desired state)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/provision-capi-management-cluster.yml'
      - 'clusters/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

env:
  SSH_OPTS: >-
    -o StrictHostKeyChecking=no
    -o PreferredAuthentications=password
    -o PubkeyAuthentication=no
    -o UserKnownHostsFile=/dev/null
    -o LogLevel=ERROR

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      child_clusters: ${{ steps.config.outputs.child_clusters }}
      k8s_version: ${{ steps.config.outputs.k8s_version }}

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Discover cluster config from repo
        id: config
        run: |
          CHILD_CLUSTERS=$(ls -d clusters/child/*/ 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')
          CHILD_CLUSTERS="${CHILD_CLUSTERS:-child-1 child-2}"
          echo "child_clusters=${CHILD_CLUSTERS}" >> $GITHUB_OUTPUT
          K8S_VERSION=$(grep -h 'version: v' clusters/child/*/cluster.yaml 2>/dev/null | head -1 | awk '{print $2}')
          echo "k8s_version=${K8S_VERSION:-v1.29.2}" >> $GITHUB_OUTPUT
          echo "Discovered: ${CHILD_CLUSTERS} @ ${K8S_VERSION:-v1.29.2}"

      - name: Verify tools
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          echo "kubectl: $(kubectl version --client --output=json | python3 -c 'import json,sys; print(json.load(sys.stdin)["clientVersion"]["gitVersion"])')"
          echo "flux:    $(flux --version | head -1)"

      - name: SSH connectivity check
        shell: nix-shell shell.nix --run "bash {0}"
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" "echo SSH_OK"

  deploy:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # ── 0. clusterctl + flux-operator CLI ──
      - name: Install CLI tools
        run: |
          curl -sL https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.7.0/clusterctl-linux-amd64 -o /usr/local/bin/clusterctl
          chmod +x /usr/local/bin/clusterctl
          curl -sL https://github.com/controlplaneio-fluxcd/flux-operator/releases/download/v0.54.1/flux-operator_0.54.1_linux_amd64.tar.gz -o /tmp/flux-op.tar.gz
          tar xzf /tmp/flux-op.tar.gz -C /usr/local/bin/ flux-operator
          chmod +x /usr/local/bin/flux-operator
          echo "clusterctl: $(clusterctl version 2>&1 | head -1)"

      # ── 1. K3s ──
      - name: Ensure K3s is running
        shell: nix-shell shell.nix --run "bash {0}"
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          if command -v k3s >/dev/null 2>&1 && systemctl is-active --quiet k3s; then
            echo "K3s already running"
          else
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode=644" sh -
            systemctl enable --now k3s
          fi
          for i in $(seq 1 30); do
            kubectl get nodes --no-headers 2>/dev/null | grep -q Ready && { echo "K3s ready after ${i}s"; break; }
            sleep 2
          done
          REMOTE

      # ── 2. Docker ──
      - name: Ensure Docker is installed
        shell: nix-shell shell.nix --run "bash {0}"
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}" bash -s <<'REMOTE'
          set -euo pipefail
          command -v docker >/dev/null 2>&1 || curl -fsSL https://get.docker.com | sh
          docker version
          REMOTE

      # ── 3. Kubeconfig ──
      - name: Retrieve management kubeconfig
        shell: nix-shell shell.nix --run "bash {0}"
        env:
          SSHPASS: ${{ secrets.PASSWORD }}
        run: |
          mkdir -p /tmp/kubeconfigs
          sshpass -e ssh $SSH_OPTS "${{ secrets.USER }}@${{ secrets.HOST }}"             'sudo cat /etc/rancher/k3s/k3s.yaml' > /tmp/kubeconfigs/mgmt.yaml
          sed -i "s/127.0.0.1/${{ secrets.HOST }}/g" /tmp/kubeconfigs/mgmt.yaml

      # ── 4. Install CAPI (skip if already installed) ──
      - name: Install Cluster API (CAPD)
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          echo "Initializing CAPI with Docker provider..."
          clusterctl init --infrastructure docker 2>&1 || true
          kubectl wait --for=condition=Available deployment/capi-controller-manager -n capi-system --timeout=5m 2>/dev/null || true
          kubectl wait --for=condition=Available deployment/capd-controller-manager -n capd-system --timeout=5m 2>/dev/null || true
          echo "=== CAPI pods ==="
          kubectl get pods -A | grep -E "capi|capd|NAME" 2>/dev/null

      # ── 5. Enable ClusterTopology feature gate (required for spec.topology) ──
      - name: Enable ClusterTopology feature gate on CAPI
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          echo "Patching CAPI controller manager to enable ClusterTopology..."

          # Patch the capi-controller-manager deployment to add CLUSTER_TOPOLOGY=true
          kubectl patch deployment capi-controller-manager -n capi-system --type='json' -p='[
            {"op": "add", "path": "/spec/template/spec/containers/0/env/-", "value": {"name": "CLUSTER_TOPOLOGY", "value": "true"}}
          ]' 2>/dev/null || echo "Patch add failed, trying replace..."

          # If add fails (env already exists), try setting it
          kubectl set env deployment/capi-controller-manager -n capi-system CLUSTER_TOPOLOGY=true 2>/dev/null || true

          echo "Waiting for CAPI controller to restart with ClusterTopology enabled..."
          kubectl rollout status deployment/capi-controller-manager -n capi-system --timeout=3m 2>/dev/null || true
          kubectl wait --for=condition=Available deployment/capi-controller-manager -n capi-system --timeout=3m 2>/dev/null || true

          echo ""
          echo "=== Verifying ClusterTopology feature gate ==="
          CAPTURE=$(kubectl get deploy capi-controller-manager -n capi-system -o jsonpath='{.spec.template.spec.containers[0].env}' 2>/dev/null)
          if [ -n "$CAPTURE" ]; then
            if echo "$CAPTURE" | grep -q "CLUSTER_TOPOLOGY"; then
              echo "  CLUSTER_TOPOLOGY=true"
            else
              echo "  CLUSTER_TOPOLOGY not set in env"
            fi
          else
            echo "  (could not verify)"
          fi

      # ── 6. Create Git auth secret ──
      - name: Create Git authentication secret
        shell: nix-shell shell.nix --run "bash {0}"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          envsubst < clusters/management/flux-operator/git-secret.yaml | kubectl apply -f -
          echo "✅ Git secret injected"

      # ── 7. Bootstrap Flux ──
      - name: Bootstrap Flux (operator + FluxInstance)
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          kubectl delete deployment flux-operator -n flux-system --ignore-not-found 2>/dev/null || true
          flux-operator install -f clusters/management/flux-operator/flux-instance.yaml || true

      - name: Wait for Flux controllers to be ready
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          echo "⏳ Waiting for Flux controllers..."
          for i in $(seq 1 30); do
            if kubectl get deployment source-controller -n flux-system &>/dev/null 2>&1; then
              echo "  source-controller appearing after $((i * 10))s"
              break
            fi
            sleep 10
          done
          kubectl wait --for=condition=Available deployment/source-controller -n flux-system --timeout=3m 2>/dev/null || true
          kubectl wait --for=condition=Available deployment/kustomize-controller -n flux-system --timeout=3m 2>/dev/null || true
          echo "=== Flux components ==="
          kubectl get pods -n flux-system | grep -E "source|kustomize|helm|notification|NAME" 2>/dev/null || echo "  (still pulling images)"
          echo "✅ Flux bootstrapped"

      - name: Apply Web UI NodePort
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          kubectl apply -f clusters/management/flux-operator/flux-web-nodeport.yaml
          echo "✅ Web UI exposed on http://${{ secrets.HOST }}:30080"

      # ── 8. Trigger Flux reconcile ──
      - name: Force Flux reconcile
        shell: nix-shell shell.nix --run "bash {0}"
        run: |
          export KUBECONFIG=/tmp/kubeconfigs/mgmt.yaml
          kubectl annotate --overwrite gitrepository/flux-system -n flux-system             flux.fluxcd.io/reconcileAt="$(date +%s)"
          echo "Flux reconcile triggered — CAPI will provision child clusters"
          sleep 15
          echo "=== CAPI Cluster state ==="
          kubectl get clusters -A -o wide 2>/dev/null || echo "No clusters yet"
          kubectl get kubeadmcontrolplane -A 2>/dev/null || echo "No control planes yet"
          kubectl get machinedeployment -A 2>/dev/null || echo "No machine deployments yet"

      - name: Summary
        run: |
          echo "================================================"
          echo "  Management cluster desired state applied ✓"
          echo "================================================"
          echo "  Components: K3s + Flux Operator + CAPI"
          echo "  CAPI:       v1.7.0 + ClusterTopology enabled"
          echo "  Cluster:    Traditional CAPI (no topology)"
          echo "  Flux UI:    http://${{ secrets.HOST }}:30080"
          echo "  Children:   ${{ needs.setup.outputs.child_clusters }}"
          echo "  K8s:        ${{ needs.setup.outputs.k8s_version }}"
          echo "================================================"
          echo "  All declarative YAML in clusters/management/"
          echo "  Add child: git push clusters/child/<name>/"
          echo "================================================"

