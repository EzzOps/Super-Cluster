apiVersion: v1
kind: Namespace
metadata:
  name: child-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: child-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: child-1
spec:
  selector:
    app: sample-app
  ports:
    - port: 80
      targetPort: 80
