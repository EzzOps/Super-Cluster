apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: supercluster
  namespace: flux-system
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:latest"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: false
    domain: "cluster.local"
  sync:
    kind: GitRepository
    url: "https://github.com/EzzOps/Super-Cluster.git"
    ref: "refs/heads/main"
    path: "./clusters/management"
    interval: 1m
    pullSecret: "flux-system"
